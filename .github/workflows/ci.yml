name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint + Type-check ──────────────────────────────────────────────────────
  # Não precisa de banco real: `prisma generate` só lê o schema.
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/dummy?schema=public'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run type-check

  # ─── Testes unitários ────────────────────────────────────────────────────────
  test:
    name: Testes
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/dummy?schema=public'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar testes
        run: npm test

  # ─── Migrations + Build ──────────────────────────────────────────────────────
  # Sobe um Postgres descartável só para validar que as migrations aplicam
  # limpas, e faz o build de produção usando os SECRETS do repositório.
  build:
    name: Migrations & Build
    runs-on: ubuntu-latest
    needs: [quality, test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: obraflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d obraflow_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/obraflow_ci?schema=public'
      # Segredos reais vêm do repositório (Settings > Secrets and variables > Actions)
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_APP_NAME: 'Diário de Obras'
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_FROM_NAME: 'Diário de Obras'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations no banco de CI
        run: npx prisma migrate deploy

      - name: Build de produção
        run: npm run build