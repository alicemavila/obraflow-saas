name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

  # Variáveis fake apenas para CI/build/testes.
  # Não são secrets reais e não devem ser usadas em produção.
  AUTH_SECRET: 'ci-auth-secret-with-at-least-32-characters'
  NEXTAUTH_URL: 'http://localhost:3000'
  NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
  NEXT_PUBLIC_APP_NAME: 'Diário de Obras'

  RESEND_API_KEY: 're_ci_fake_key'
  EMAIL_FROM: 'noreply@example.test'
  EMAIL_FROM_NAME: 'Diário de Obras'

  R2_ACCOUNT_ID: 'ci-account-id'
  R2_ACCESS_KEY_ID: 'ci-access-key-id'
  R2_SECRET_ACCESS_KEY: 'ci-secret-access-key'
  R2_BUCKET_NAME: 'ci-bucket'
  R2_PUBLIC_URL: 'http://localhost:3000/uploads'

jobs:
  quality:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/dummy?schema=public'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

  test:
    name: Testes
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: 'postgresql://user:pass@localhost:5432/dummy?schema=public'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar testes
        run: npm test

  build:
    name: Migrations & Build
    runs-on: ubuntu-latest
    needs: [quality, test]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: obraflow_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d obraflow_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: 'postgresql://ci:ci@localhost:5432/obraflow_ci?schema=public'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Aplicar migrations no banco de CI
        run: npx prisma migrate deploy

      - name: Build de produção
        run: npm run build